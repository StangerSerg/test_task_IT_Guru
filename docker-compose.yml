name: order-service
services:
  db:
    image: postgres:15
    container_name: ds-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8001:8001"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/order_service
    command: sh -c "sleep 3 && python init_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload"

volumes:
  postgres_data: